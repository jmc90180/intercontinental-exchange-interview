services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: bond_portfolio
      POSTGRES_USER: bond_user
      POSTGRES_PASSWORD: bond_pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bond_user -d bond_portfolio"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/bond_portfolio
      SPRING_DATASOURCE_USERNAME: bond_user
      SPRING_DATASOURCE_PASSWORD: bond_pass

volumes:
  pgdata:
